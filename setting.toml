[logging]
level = "INFO"
directory = "logs"

[server]
protocol_version = "2025-06-18"
server_name = "ida-stdio-mcp"
server_version = "0.2.0"
default_input_path = ""

[feature_gates]
allow_unsafe = false
allow_debugger = false
isolated_contexts = false

[runtime_workspace]
directory = ".runtime"
symbol_cache_directory = ".runtime/symbol-cache"

[limits]
default_page_size = 100
max_page_size = 1000
max_search_hits = 1000
max_callgraph_depth = 4
