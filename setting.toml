[logging]
level = "INFO"
directory = "logs"

[server]
protocol_version = "2025-06-18"
server_name = "ida-stdio-mcp"
server_version = "0.2.0"
default_input_path = ""

[feature_gates]
allow_unsafe = false
allow_debugger = false
isolated_contexts = false

[limits]
default_page_size = 100
max_page_size = 1000
max_search_hits = 1000
max_callgraph_depth = 4

[directory_analysis]
recursive = true
max_candidates = 20
max_deep_analysis = 5
prefer_managed = false
prefer_native = false
prefer_entry_binary = true
prefer_user_code = true
scoring_profile = "default"
include_extensions = [
  ".exe",
  ".dll",
  ".sys",
  ".elf",
  ".so",
  ".bin",
]
exclude_patterns = [
  "*.i64",
  "*.idb",
  "*.nam",
  "*.til",
]
